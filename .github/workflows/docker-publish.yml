name: Create and publish a Docker image

on:
  push:
    branches: ['main']
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Build and push Docker image
        run: |
          # Lowercase the repository name (required by GHCR)
          IMAGE_LOWER=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          
          # Build the Docker image
          docker build -t "$IMAGE_LOWER:latest" .
          
          # Push latest tag
          docker push "$IMAGE_LOWER:latest"
          
          # If tagged commit, tag and push as tag version
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_NAME=$(echo "${{ github.ref }}" | sed -e 's,.*/\(.*\),\1,')
            docker tag "$IMAGE_LOWER:latest" "$IMAGE_LOWER:$TAG_NAME"
            docker push "$IMAGE_LOWER:$TAG_NAME"
          fi
