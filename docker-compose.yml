services:
  comics-now:
    build: .
    container_name: comics-now
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      # Mount your comic libraries here. 
      # The internal path should match what you put in config.json
      - /path/to/your/comics:/comics:ro
    environment:
      - NODE_ENV=production
    restart: unless-stopped
